services:
    # Sua API Laravel customizada
    api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: payment_api
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            - LARAVEL_SAIL=1
            - DB_HOST=mysql
            - DB_PORT=3306
            - DB_DATABASE=${DB_DATABASE:-laravel}
            - DB_USERNAME=${DB_USERNAME:-sail}
            - DB_PASSWORD=${DB_PASSWORD:-password}
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy

    # Mocks de Pagamento (Gateway Mock)
    payment-mocks:
        image: matheusprotzen/gateways-mock
        container_name: payment_mocks
        ports:
            - '3001:3001'
            - '3002:3002'
        environment:
            - REMOVE_AUTH=true
        networks:
            - sail

    # Banco de Dados MySQL
    mysql:
        image: 'mysql:8.4'
        container_name: payment_db
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE:-laravel}'
            MYSQL_USER: '${DB_USERNAME:-sail}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'sail-mysql:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
            retries: 3
            timeout: 5s

networks:
    sail:
        driver: bridge

volumes:
    sail-mysql:
        driver: local
